<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 在线学习平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 420px;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            color: #fff;
            font-size: 28px;
        }

        .header h1 {
            font-size: 22px;
            color: #1a1a2e;
            margin-bottom: 6px;
        }

        .header p {
            color: #888;
            font-size: 13px;
        }

        .form-group {
            margin-bottom: 18px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.25s, box-shadow 0.25s;
            outline: none;
            background: #fafbfc;
        }

        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
            background: #fff;
        }

        .form-group input.error {
            border-color: #e53e3e;
            background: #fff5f5;
        }

        .msg {
            font-size: 12px;
            margin-top: 5px;
            min-height: 18px;
        }

        .msg.error { color: #e53e3e; }

        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .remember-me input[type="checkbox"] {
            width: 15px;
            height: 15px;
            accent-color: #667eea;
        }

        .remember-me label {
            color: #666;
            cursor: pointer;
        }

        .forgot-link {
            color: #667eea;
            text-decoration: none;
            font-size: 13px;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            transition: opacity 0.25s, transform 0.15s;
        }

        .btn-submit:hover {
            opacity: 0.92;
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #888;
        }

        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .result-toast {
            display: none;
            padding: 14px 18px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            margin-top: 18px;
        }

        .result-toast.show {
            display: block;
            animation: fadeInUp 0.3s ease;
        }

        .result-toast.success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
        }

        .result-toast.error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #feb2b2;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 22px 0;
            color: #bbb;
            font-size: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        .social-login {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .social-btn {
            width: 44px;
            height: 44px;
            border: 2px solid #e2e8f0;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .social-btn:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 520px) {
            .container { padding: 28px 22px; }
            .header h1 { font-size: 19px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-icon">&#x1F393;</div>
            <h1>欢迎回来</h1>
            <p>登录你的在线学习平台账号</p>
        </div>

        <form id="login-form" novalidate>
            <!-- 账号（邮箱/用户名） -->
            <div class="form-group">
                <label for="account">邮箱 / 用户名</label>
                <div class="input-wrapper">
                    <input type="text" id="account" placeholder="请输入邮箱或用户名" autocomplete="username">
                </div>
                <div class="msg" id="account-msg"></div>
            </div>

            <!-- 密码 -->
            <div class="form-group">
                <label for="password">密码</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
                </div>
                <div class="msg" id="password-msg"></div>
            </div>

            <!-- 记住我 + 忘记密码 -->
            <div class="options-row">
                <div class="remember-me">
                    <input type="checkbox" id="remember">
                    <label for="remember">记住我</label>
                </div>
                <a href="#" class="forgot-link">忘记密码？</a>
            </div>

            <button type="submit" class="btn-submit">登 录</button>
        </form>

        <div class="result-toast" id="result-toast"></div>

        <div class="divider">或使用第三方账号登录</div>

        <div class="social-login">
            <button class="social-btn" title="微信登录" onclick="alert('微信登录（需接入微信开放平台）')">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="#07c160">
                    <path d="M8.69 3.46c-3.87 0-7 2.78-7 6.2 0 1.89 1 3.58 2.53 4.69l-.64 1.94 2.22-1.11c.89.27 1.86.42 2.89.42.37 0 .73-.03 1.09-.07-.2-.65-.32-1.33-.32-2.04 0-3.67 3.38-6.65 7.54-6.65.24 0 .48.02.71.04C17.38 5.24 13.89 3.46 8.69 3.46zm-2.2 3.78c.46 0 .83.33.83.74 0 .41-.37.74-.83.74-.46 0-.83-.33-.83-.74 0-.41.37-.74.83-.74zm4.4 0c.46 0 .83.33.83.74 0 .41-.37.74-.83.74-.46 0-.83-.33-.83-.74 0-.41.37-.74.83-.74z"/>
                    <path d="M16.69 12.46c-3.3 0-5.98 2.36-5.98 5.27s2.68 5.27 5.98 5.27c.71 0 1.4-.12 2.08-.33l1.82.91-.53-1.6c1.59-1.08 2.61-2.58 2.61-4.25s-2.68-5.27-5.98-5.27zm-1.77 2.88c.38 0 .69.28.69.63 0 .35-.31.63-.69.63-.38 0-.69-.28-.69-.63 0-.35.31-.63.69-.63zm3.54 0c.38 0 .69.28.69.63 0 .35-.31.63-.69.63-.38 0-.69-.28-.69-.63 0-.35.31-.63.69-.63z"/>
                </svg>
            </button>
            <button class="social-btn" title="QQ登录" onclick="alert('QQ登录（需接入QQ互联）')">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="#12b7f5">
                    <circle cx="12" cy="12" r="10"/>
                </svg>
            </button>
            <button class="social-btn" title="GitHub登录" onclick="alert('GitHub登录（需接入GitHub OAuth）')">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="#333">
                    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z"/>
                </svg>
            </button>
        </div>

        <div class="register-link">
            还没有账号？<a href="register.html">立即注册</a>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        var form    = document.getElementById('login-form');
        var account = document.getElementById('account');
        var pwd     = document.getElementById('password');
        var remember = document.getElementById('remember');
        var toast   = document.getElementById('result-toast');

        function setError(input, msgId, text) {
            input.className = 'error';
            document.getElementById(msgId).className = 'msg error';
            document.getElementById(msgId).textContent = text;
        }

        function clearError(input, msgId) {
            input.className = '';
            document.getElementById(msgId).className = 'msg';
            document.getElementById(msgId).textContent = '';
        }

        function showToast(type, message) {
            toast.className = 'result-toast show ' + type;
            toast.textContent = message;
        }

        // ========== 账号验证 ==========
        function validateAccount() {
            var val = account.value.trim();
            if (!val) {
                setError(account, 'account-msg', '请输入邮箱或用户名');
                console.log('账号验证失败: 不能为空');
                return false;
            }
            // XSS 检测
            if (/<script|javascript:|on\w+\s*=/i.test(val)) {
                setError(account, 'account-msg', '包含非法字符');
                console.log('账号验证失败: 检测到XSS攻击特征');
                return false;
            }
            clearError(account, 'account-msg');
            console.log('账号验证通过');
            return true;
        }

        // ========== 密码验证 ==========
        function validatePassword() {
            var val = pwd.value;
            if (!val) {
                setError(pwd, 'password-msg', '请输入密码');
                console.log('密码验证失败: 不能为空');
                return false;
            }
            if (val.length < 6) {
                setError(pwd, 'password-msg', '密码长度至少6个字符');
                console.log('密码验证失败: 长度不足');
                return false;
            }
            clearError(pwd, 'password-msg');
            console.log('密码验证通过');
            return true;
        }

        // ========== 事件绑定 ==========
        account.addEventListener('blur',  validateAccount);
        account.addEventListener('input', function() {
            if (account.classList.contains('error')) validateAccount();
        });

        pwd.addEventListener('blur',  validatePassword);
        pwd.addEventListener('input', function() {
            if (pwd.classList.contains('error')) validatePassword();
        });

        // ========== 表单提交 ==========
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            console.log('===== 登录表单提交 =====');

            var v1 = validateAccount();
            var v2 = validatePassword();

            if (v1 && v2) {
                // 模拟登录（实际项目中发 AJAX 到后端验证）
                var loginData = {
                    account: account.value.trim(),
                    remember: remember.checked,
                    timestamp: new Date().toISOString()
                };
                console.log('登录数据:', loginData);
                console.log('表单验证通过，提交登录请求');
                showToast('success', '登录成功！正在跳转...');

                // 实际项目中跳转到主页
                // window.location.href = 'index.html';
            } else {
                console.log('表单验证失败');
                showToast('error', '请检查账号和密码');
            }
        });

        // ========== 忘记密码链接 ==========
        document.querySelector('.forgot-link').addEventListener('click', function(e) {
            e.preventDefault();
            alert('密码重置功能：实际项目中发送重置邮件到注册邮箱。\n（此处为模拟演示）');
        });
    })();
    </script>
</body>
</html>
