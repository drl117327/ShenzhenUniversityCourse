<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>WebWorker 质数计算实验</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    input, button {
      padding: 10px;
      margin: 10px;
      font-size: 16px;
    }
    #progress { margin: 20px auto; font-size: 18px; color: #555; }
    #result { margin-top: 20px; font-size: 24px; color: #007BFF; }
    #container {
      margin-top: 30px;
      border: 1px solid #ccc;
      position: relative;
      width: 100%;
      height: 250px;
    }
    .circle {
      position: absolute;
      top: 40px;
      width: 50px;
      height: 50px;
      background-color: blue;
      border-radius: 50%;
    }
    .circle:nth-child(2) { top: 110px; }
    .circle:nth-child(3) { top: 180px; }
    hr {
      margin-top: 40px;
      margin-bottom: 40px;
      border: 0;
      border-top: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <h1>利用 WebWorker 计算质数数量</h1>
  <div>
    <label for="start">输入范围起始：</label>
    <input type="number" id="start" value="1" />
    <label for="end">输入范围结束：</label>
    <input type="number" id="end" value="1000000" />
    <button id="startButton">开始计算</button>
  </div>
  <div id="progress">等待开始计算...</div>
  <div id="result"></div>
  <hr />
  <h2>UI 动态效果展示（平移动画）</h2>
  <div id="container">
    <div id="circle1" class="circle"></div>
    <div id="circle2" class="circle"></div>
    <div id="circle3" class="circle"></div>
  </div>
  <button id="startAnimationButton">开始动画</button>
  <script>
    var animationIntervals = [];

    document.getElementById("startButton").addEventListener("click", function() {
      var start = parseInt(document.getElementById("start").value, 10);
      var end = parseInt(document.getElementById("end").value, 10);

      if (isNaN(start) || isNaN(end) || start <= 0 || end <= 0 || end < start) {
        alert("请输入有效的范围！");
        return;
      }

      var worker = new Worker("worker.js");
      document.getElementById("progress").textContent = "正在计算，请稍候...";
      document.getElementById("result").textContent = "";

      worker.postMessage({ start: start, end: end });

      worker.onmessage = function(event) {
        var data = event.data;
        if (data.type === "progress") {
          document.getElementById("progress").textContent = "正在计算:" + data.current;
        } else if (data.type === "result") {
          document.getElementById("progress").textContent = "计算完成！";
          document.getElementById("result").textContent = "范围内的质数数量是：" + data.count;
          worker.terminate();
        }
      };
    });

    function startAnimation() {
      var circles = [
        document.getElementById("circle1"),
        document.getElementById("circle2"),
        document.getElementById("circle3"),
      ];
      circles.forEach(function(circle, index) {
        var position = 0;
        var interval = setInterval(function() {
          if (position > window.innerWidth) {
            circle.style.left = window.innerWidth + "px";
            clearInterval(interval);
          } else {
            position += 1;
            circle.style.left = position + "px";
          }
        }, 5);
        animationIntervals.push(interval);
      });
    }

    document.getElementById("startAnimationButton").addEventListener("click", function() {
      animationIntervals.forEach(function(id) { clearInterval(id); });
      animationIntervals = [];
      var circles = [
        document.getElementById("circle1"),
        document.getElementById("circle2"),
        document.getElementById("circle3"),
      ];
      circles.forEach(function(circle) {
        circle.style.left = "0px";
      });
      startAnimation();
    });
  </script>
</body>
</html>
